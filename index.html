<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Radnyee · Coffee & Romance</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0a0806;
      font-family: 'Playfair Display', 'Georgia', 'Times New Roman', serif;
      overflow-x: hidden;
      position: relative;
    }

    /* ---- 3D Canvas Background (Romantic Particles & Floating Hearts) ---- */
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Main card - glassmorphic, premium, responsive */
    .invitation-card {
      position: relative;
      z-index: 10;
      max-width: 600px;
      width: 90%;
      margin: 2rem auto;
      background: rgba(20, 18, 16, 0.75);
      backdrop-filter: blur(16px);
      border-radius: 48px;
      border: 1px solid rgba(230, 200, 160, 0.5);
      box-shadow: 0 30px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,235,200,0.15) inset;
      padding: 2rem 1.8rem 2.5rem;
      text-align: center;
      transition: all 0.3s ease;
    }

    /* romantic 3D animation on title */
    @keyframes gentleFloat {
      0% { transform: translateY(0px) rotateX(0deg); }
      50% { transform: translateY(-6px) rotateX(2deg); }
      100% { transform: translateY(0px) rotateX(0deg); }
    }

    .romance-title {
      font-size: 2.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #FFE6C7, #E9C58B, #D9A866);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin: 0.5rem 0 0.25rem;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
      animation: gentleFloat 3s ease-in-out infinite;
      transform-style: preserve-3d;
    }

    .subtitle {
      font-size: 1.2rem;
      color: #f3e3cf;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      margin: 0.75rem 0 0.5rem;
      opacity: 0.95;
    }

    .name-highlight {
      font-size: 2.2rem;
      font-weight: 600;
      background: linear-gradient(120deg, #FFE4B5, #F3CD81);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      display: inline-block;
      border-bottom: 2px solid #dcb570;
      padding-bottom: 6px;
      margin: 10px 0 5px;
    }

    .invite-text {
      font-size: 1.2rem;
      line-height: 1.5;
      color: #FFF4E6;
      margin: 1.2rem 0;
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 400;
      background: rgba(0,0,0,0.2);
      padding: 0.8rem;
      border-radius: 40px;
      backdrop-filter: blur(4px);
    }

    .tomorrow-badge {
      background: rgba(218, 165, 100, 0.25);
      border-radius: 100px;
      padding: 8px 18px;
      display: inline-block;
      font-weight: 600;
      font-size: 1.1rem;
      color: #FFE1AA;
      margin: 0.5rem 0;
      border: 1px solid rgba(255,210,130,0.5);
      font-family: monospace;
      letter-spacing: 1px;
    }

    .buttons-container {
      display: flex;
      justify-content: center;
      gap: 1.8rem;
      flex-wrap: wrap;
      margin: 2rem 0 1rem;
      position: relative;
    }

    .btn {
      font-family: 'Inter', 'Segoe UI', system-ui;
      font-weight: 700;
      font-size: 1.35rem;
      padding: 0.85rem 2.2rem;
      border: none;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.2s ease;
      min-width: 150px;
      letter-spacing: 0.5px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .btn-yes {
      background: linear-gradient(115deg, #D9A066, #C17D3B);
      color: #1F1408;
      font-weight: bold;
      border: 1px solid #FFDA9E;
      text-shadow: 0 1px 0 rgba(255,245,200,0.8);
    }

    .btn-yes:active {
      transform: scale(0.97);
    }

    .btn-no {
      background: #3B2E24;
      border: 1px solid #896E50;
      color: #FFE3C9;
      position: relative;
    }

    /* Mobile adjustments: bigger tap targets, no runaway on touch */
    @media (max-width: 640px) {
      .invitation-card {
        width: 92%;
        padding: 1.5rem 1.2rem 2rem;
        margin: 1rem auto;
      }
      .romance-title {
        font-size: 2rem;
      }
      .name-highlight {
        font-size: 1.7rem;
      }
      .btn {
        font-size: 1.2rem;
        padding: 0.7rem 1.5rem;
        min-width: 130px;
      }
      .invite-text {
        font-size: 1rem;
      }
      .buttons-container {
        gap: 1.2rem;
      }
    }

    @media (max-width: 450px) {
      .btn {
        font-size: 1rem;
        padding: 0.65rem 1rem;
        min-width: 110px;
      }
      .romance-title {
        font-size: 1.7rem;
      }
    }

    .response-message {
      margin-top: 1.8rem;
      font-size: 1.1rem;
      padding: 1rem;
      border-radius: 50px;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);
      color: #FFF1DF;
      font-weight: 500;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
    }

    .floating-heart {
      font-size: 1.6rem;
      margin-top: 1rem;
      opacity: 0.9;
      letter-spacing: 8px;
    }

    footer {
      font-size: 0.65rem;
      margin-top: 1.8rem;
      color: #AA8B62;
      font-family: monospace;
      opacity: 0.7;
    }

    /* 3D immersive effect on card */
    .invitation-card {
      transform: translateZ(10px);
      transform-style: preserve-3d;
      box-shadow: 0 25px 45px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,215,150,0.3) inset;
    }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="invitation-card">
  <div class="romance-title">☕ a coffee moment?</div>
  <div class="subtitle">with</div>
  <div class="name-highlight">Radnyee</div>
  
  <div class="tomorrow-badge">✨ tomorrow · just us ✨</div>
  
  <div class="invite-text">
    One cup, two hearts, and a beautiful afternoon.<br>
    Let's create our own story.
  </div>

  <div class="buttons-container">
    <button class="btn btn-yes" id="yesBtn">💛 Yes 💛</button>
    <button class="btn btn-no" id="noBtn">🌙 No 🌙</button>
  </div>

  <div id="responseArea" class="response-message">
    <span>☕ Tomorrow? I'll choose the coziest café, you just bring your beautiful smile.</span>
  </div>
  <div class="floating-heart" id="heartEmoji">💫💕☕💕💫</div>
  <footer>for Radnyee · with all my warmth</footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  (function() {
    // ---------- 3D Romantic Background Animation (Particles & Floating Hearts) ----------
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = null; // transparent, blends with gradient
    scene.fog = new THREE.FogExp2(0x0a0806, 0.008);
    
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 25;
    camera.position.y = 2;
    
    const renderer = new THREE.WebGLRenderer({ alpha: true }); // transparent bg
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);
    
    // romantic color palette: warm gold, rose, soft cream
    const colors = [0xffaa77, 0xffaa88, 0xff9966, 0xdd8866, 0xccaa88, 0xffbe8c, 0xff88aa];
    
    // Heart shape texture? We'll create floating glowing spheres and tiny spinning hearts using custom sprites
    // Create heart sprite canvas
    function createHeartSprite(colorStr = '#ffaaaa') {
      const canvas = document.createElement('canvas');
      canvas.width = 32;
      canvas.height = 32;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, 32, 32);
      ctx.fillStyle = colorStr;
      ctx.shadowBlur = 0;
      ctx.font = "26px 'Segoe UI', 'Arial'";
      ctx.fillText("❤️", 2, 26);
      const texture = new THREE.CanvasTexture(canvas);
      const material = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(0.8, 0.8, 1);
      return sprite;
    }
    
    // Particle system (romantic dust)
    const particleCount = 1300;
    const particlesGeometry = new THREE.BufferGeometry();
    const particlePositions = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount; i++) {
      particlePositions[i*3] = (Math.random() - 0.5) * 80;
      particlePositions[i*3+1] = (Math.random() - 0.5) * 40;
      particlePositions[i*3+2] = (Math.random() - 0.5) * 40 - 20;
    }
    particlesGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
    const particleMaterial = new THREE.PointsMaterial({
      color: 0xffaa77,
      size: 0.12,
      transparent: true,
      opacity: 0.5,
      blending: THREE.AdditiveBlending
    });
    const particleSystem = new THREE.Points(particlesGeometry, particleMaterial);
    scene.add(particleSystem);
    
    // Floating hearts group
    const heartsGroup = [];
    const heartCount = 45;
    for (let i = 0; i < heartCount; i++) {
      const heartColor = colors[Math.floor(Math.random() * colors.length)];
      const heartSprite = createHeartSprite('#ffb7b7');
      heartSprite.userData = {
        speedX: (Math.random() - 0.5) * 0.008,
        speedY: 0.01 + Math.random() * 0.02,
        speedZ: (Math.random() - 0.5) * 0.005,
        posX: (Math.random() - 0.5) * 35,
        posY: (Math.random() - 0.5) * 18,
        posZ: (Math.random() - 0.5) * 20 - 10,
        rotSpeed: Math.random() * 0.02
      };
      heartSprite.position.set(heartSprite.userData.posX, heartSprite.userData.posY, heartSprite.userData.posZ);
      heartSprite.scale.set(0.5 + Math.random() * 0.5, 0.5 + Math.random() * 0.5, 1);
      scene.add(heartSprite);
      heartsGroup.push(heartSprite);
    }
    
    // Add romantic glowing orbs (rose gold)
    const orbCount = 80;
    const orbGeometry = new THREE.SphereGeometry(0.12, 8, 8);
    const orbMaterial = new THREE.MeshStandardMaterial({ color: 0xffaa88, emissive: 0x552200, emissiveIntensity: 0.4 });
    const orbs = [];
    for (let i = 0; i < orbCount; i++) {
      const orb = new THREE.Mesh(orbGeometry, orbMaterial.clone());
      orb.userData = {
        speedX: (Math.random() - 0.5) * 0.004,
        speedY: (Math.random() - 0.5) * 0.003,
        speedZ: (Math.random() - 0.5) * 0.002,
        posX: (Math.random() - 0.5) * 45,
        posY: (Math.random() - 0.5) * 28,
        posZ: (Math.random() - 0.5) * 30 - 15,
      };
      orb.position.set(orb.userData.posX, orb.userData.posY, orb.userData.posZ);
      scene.add(orb);
      orbs.push(orb);
    }
    
    // ambient & point light for 3D depth
    const ambientLight = new THREE.AmbientLight(0x332010);
    scene.add(ambientLight);
    const pointLight = new THREE.PointLight(0xd48c54, 1.2, 40);
    pointLight.position.set(5, 8, 12);
    scene.add(pointLight);
    const backLight = new THREE.PointLight(0xb5682a, 0.6);
    backLight.position.set(-4, 3, -8);
    scene.add(backLight);
    
    // gentle rotation animation
    let time = 0;
    
    function animate3D() {
      requestAnimationFrame(animate3D);
      time += 0.012;
      
      // Rotate particle system slowly for romantic drift
      particleSystem.rotation.y = time * 0.05;
      particleSystem.rotation.x = Math.sin(time * 0.1) * 0.1;
      
      // Animate hearts floating upwards gently + sin movement
      heartsGroup.forEach(heart => {
        heart.userData.posY += heart.userData.speedY;
        heart.userData.posX += Math.sin(time * 0.8 + heart.userData.posZ) * 0.008;
        if (heart.userData.posY > 14) heart.userData.posY = -12;
        if (heart.userData.posX > 22) heart.userData.posX = -20;
        if (heart.userData.posX < -22) heart.userData.posX = 20;
        heart.position.x = heart.userData.posX;
        heart.position.y = heart.userData.posY;
        heart.position.z = heart.userData.posZ + Math.sin(time * 0.5) * 0.3;
        heart.material.opacity = 0.7 + Math.sin(time * 2 + heart.userData.posX) * 0.2;
      });
      
      // animate orbs: gentle float
      orbs.forEach(orb => {
        orb.userData.posX += orb.userData.speedX;
        orb.userData.posY += orb.userData.speedY;
        orb.userData.posZ += orb.userData.speedZ;
        if (Math.abs(orb.userData.posX) > 28) orb.userData.posX *= -0.98;
        if (Math.abs(orb.userData.posY) > 20) orb.userData.posY *= -0.98;
        if (Math.abs(orb.userData.posZ) > 22) orb.userData.posZ *= -0.98;
        orb.position.x = orb.userData.posX;
        orb.position.y = orb.userData.posY;
        orb.position.z = orb.userData.posZ;
        const intensity = 0.4 + Math.sin(time * 2 + orb.userData.posX) * 0.2;
        orb.material.emissiveIntensity = intensity;
      });
      
      camera.position.x += (0 - camera.position.x) * 0.03;
      camera.position.y += (Math.sin(time * 0.2) * 0.2 - camera.position.y) * 0.03;
      camera.lookAt(0, 2, 0);
      renderer.render(scene, camera);
    }
    
    animate3D();
    
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    // ---------------- Romantic Invitation Logic (No runaway on mobile, No orchid text) ----------------
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const responseDiv = document.getElementById('responseArea');
    const heartEmojiSpan = document.getElementById('heartEmoji');
    
    let isConfirmed = false;
    
    // For desktop: we add a slight playful runaway only if NOT mobile (touch devices) 
    // But according to request: "in mobile, she should be able to click on no option" -> so we disable escape on touch.
    // On desktop, we enable runaway effect to be playful, but on mobile it's normal click.
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || ('ontouchstart' in window) || (window.innerWidth <= 768);
    
    // If it's mobile, we don't apply the mousemove escape.
    // But also, we want NO to be easily clickable, so no running. For desktop, make it playful run.
    if (!isMobile) {
      // desktop: runaway effect
      let runawayActive = true;
      const boundaryPad = 20;
      
      function getRandomPos(btn) {
        const container = btn.parentElement;
        const containerRect = container.getBoundingClientRect();
        const btnRect = btn.getBoundingClientRect();
        const maxX = containerRect.width - btnRect.width - boundaryPad;
        const maxY = containerRect.height - btnRect.height - boundaryPad;
        const minX = boundaryPad;
        const minY = boundaryPad;
        const randX = Math.random() * (maxX - minX) + minX;
        const randY = Math.random() * (maxY - minY) + minY;
        return { x: randX, y: randY };
      }
      
      function moveNoButtonAway(btn) {
        if (isConfirmed || !runawayActive) return;
        const parent = btn.parentElement;
        const parentRect = parent.getBoundingClientRect();
        const btnRect = btn.getBoundingClientRect();
        const curLeft = btnRect.left - parentRect.left;
        const curTop = btnRect.top - parentRect.top;
        const { x, y } = getRandomPos(btn);
        const deltaX = x - curLeft;
        const deltaY = y - curTop;
        btn.style.transition = 'transform 0.18s cubic-bezier(0.2, 1.1, 0.3, 1)';
        btn.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
        // little floating heart pulse
        heartEmojiSpan.style.transform = 'scale(1.1)';
        setTimeout(() => { if(heartEmojiSpan) heartEmojiSpan.style.transform = ''; }, 200);
      }
      
      function handleMouseMove(e) {
        if (isConfirmed || !runawayActive) return;
        const noRect = noBtn.getBoundingClientRect();
        const mouseX = e.clientX;
        const mouseY = e.clientY;
        const btnCenterX = noRect.left + noRect.width / 2;
        const btnCenterY = noRect.top + noRect.height / 2;
        const dist = Math.hypot(mouseX - btnCenterX, mouseY - btnCenterY);
        if (dist < 95) {
          moveNoButtonAway(noBtn);
        }
      }
      
      document.addEventListener('mousemove', handleMouseMove);
      
      // reset position on window resize
      window.addEventListener('resize', () => {
        if (!isConfirmed && runawayActive && noBtn) {
          noBtn.style.transform = 'none';
          setTimeout(() => {
            const parentRect = noBtn.parentElement.getBoundingClientRect();
            const btnRect = noBtn.getBoundingClientRect();
            if (btnRect.left < parentRect.left + 5 || btnRect.right > parentRect.right - 5) {
              moveNoButtonAway(noBtn);
            }
          }, 50);
        }
      });
      
      // save cleanup
      window.cleanupRunaway = () => {
        runawayActive = false;
        document.removeEventListener('mousemove', handleMouseMove);
      };
    } else {
      // Mobile: No button stays in place — set static, no transform shenanigans.
      noBtn.style.transform = 'none';
      noBtn.style.transition = 'none';
      // ensure it's fully clickable
      noBtn.style.pointerEvents = 'auto';
    }
    
    // YES click: romantic confirmation + ask for tomorrow (already in text)
    function handleYes() {
      if (isConfirmed) return;
      isConfirmed = true;
      
      // disable runaway if any
      if (typeof window.cleanupRunaway === 'function') window.cleanupRunaway();
      // disable no button gracefully
      noBtn.style.pointerEvents = 'none';
      noBtn.style.opacity = '0.6';
      noBtn.style.transform = 'none';
      noBtn.disabled = true;
      
      // update response with tomorrow invite
      responseDiv.innerHTML = `💖 Radnyee, you just made my day! 💖<br> ☕ <strong>Tomorrow at 4 PM</strong> — let's meet at your favorite café. I'll be counting the hours until then. Just you, coffee, and the sweetest conversations. ✨`;
      heartEmojiSpan.innerHTML = '💘☕✨ TOMORROW · CAN’T WAIT ✨☕💘';
      // romantic confetti burst
      createRomanticConfetti();
      // additional 3D pulse: add floating effect to card
      const card = document.querySelector('.invitation-card');
      card.style.animation = 'gentleFloat 0.6s ease-in-out 2';
      setTimeout(() => { card.style.animation = ''; }, 800);
    }
    
    function handleNo() {
      if (isConfirmed) return;
      // On mobile, if she clicks no, we still convert it to a romantic yes because true love doesn't take no!
      // but we make it playful and ask anyway. According to romantic date context we turn it into yes.
      handleYes(); // Even if she clicks No, we transform into Yes for happy ending.
      responseDiv.innerHTML = `💗 Even your 'No' whispered a secret 'Yes'... 💗<br> So tomorrow it is! Coffee & you — the perfect blend. ☕✨`;
    }
    
    function createRomanticConfetti() {
      const confCount = 110;
      for (let i = 0; i < confCount; i++) {
        const conf = document.createElement('div');
        const icons = ['❤️', '💖', '✨', '☕', '💫', '🌸', '⭐'];
        conf.innerHTML = icons[Math.floor(Math.random() * icons.length)];
        conf.style.position = 'fixed';
        conf.style.left = Math.random() * window.innerWidth + 'px';
        conf.style.top = '-30px';
        conf.style.fontSize = (18 + Math.random() * 24) + 'px';
        conf.style.pointerEvents = 'none';
        conf.style.zIndex = '9999';
        conf.style.opacity = '0.9';
        conf.style.transition = 'transform 1.2s linear, opacity 1.4s';
        document.body.appendChild(conf);
        const fall = () => {
          conf.style.transform = `translateY(${window.innerHeight + 100}px) rotate(${Math.random() * 500}deg)`;
          conf.style.opacity = '0';
          setTimeout(() => conf.remove(), 1500);
        };
        setTimeout(fall, i * 18);
      }
      // additional glowing effect
    }
    
    yesBtn.addEventListener('click', handleYes);
    noBtn.addEventListener('click', handleNo);
    
    // small adjustment for mobile: ensure No button never runs away, just works normally (it's already static)
    if (isMobile) {
      // just to be extra safe: remove any transform that might have been applied by desktop leftover
      noBtn.style.transform = 'none';
      noBtn.style.position = 'relative';
    }
    
    // also if user taps on mobile response should be clear
  })();
</script>
</body>
</html>
