<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Radnyee · Coffee?</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* prevents accidental text selection, keeps clean */
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at center, #0f0c0a 0%, #020100 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 3D Canvas Background - Romantic Particles & Floating Hearts */
    #canvas-3d {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: block;
    }

    /* Main Card - Minimal, Premium, Glass */
    .card {
      position: relative;
      z-index: 20;
      max-width: 520px;
      width: 86%;
      margin: 1.5rem;
      background: rgba(15, 12, 10, 0.65);
      backdrop-filter: blur(18px);
      border-radius: 56px;
      border: 1px solid rgba(255, 200, 140, 0.35);
      box-shadow: 0 30px 50px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,210,140,0.2) inset;
      padding: 2rem 1.8rem 2.2rem;
      text-align: center;
      transition: all 0.2s ease;
    }

    h1 {
      font-size: 3rem;
      font-weight: 600;
      background: linear-gradient(135deg, #FFE5C4, #EFC48C, #DBA55C);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .her-name {
      font-size: 2rem;
      font-weight: 500;
      color: #F7DEA3;
      margin: 0.3rem 0;
      display: inline-block;
      border-bottom: 1.5px solid #E9BC7A;
      padding-bottom: 4px;
    }

    .date-time {
      margin-top: 1.2rem;
      background: rgba(0,0,0,0.35);
      display: inline-block;
      padding: 0.5rem 1.4rem;
      border-radius: 60px;
      font-size: 1.2rem;
      font-weight: 500;
      color: #FFE2B5;
      font-family: monospace;
      letter-spacing: 1px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,190,100,0.4);
    }

    .ask {
      font-size: 1.2rem;
      margin: 1.5rem 0 1rem;
      color: #FFF2E2;
      line-height: 1.4;
      font-weight: 400;
      background: rgba(0,0,0,0.25);
      padding: 0.6rem;
      border-radius: 40px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin: 1.8rem 0 1rem;
      flex-wrap: wrap;
    }

    .btn {
      font-family: 'Inter', system-ui;
      font-weight: 700;
      font-size: 1.35rem;
      padding: 0.8rem 2.2rem;
      border: none;
      border-radius: 80px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s;
      min-width: 140px;
      letter-spacing: 0.5px;
      backdrop-filter: blur(2px);
    }

    .btn-yes {
      background: linear-gradient(115deg, #DC9E5C, #B96F2E);
      color: #1D130A;
      box-shadow: 0 10px 18px rgba(0,0,0,0.4);
      border: 1px solid #FFCD94;
      font-weight: 800;
    }

    .btn-yes:active {
      transform: scale(0.96);
    }

    .btn-no {
      background: #30261F;
      border: 1px solid #7A6248;
      color: #E7CDAA;
      cursor: pointer;
      transition: all 0.05s linear;
    }

    /* Mobile: No button is disabled (pointer-events: none) */
    .no-disabled-mobile {
      opacity: 0.55;
      cursor: not-allowed;
      filter: grayscale(0.1);
    }

    .response-area {
      margin-top: 1.5rem;
      font-size: 1rem;
      padding: 0.8rem;
      background: rgba(0,0,0,0.4);
      border-radius: 50px;
      color: #FFEFD6;
      font-weight: 400;
      backdrop-filter: blur(8px);
    }

    .tiny-footer {
      font-size: 0.65rem;
      margin-top: 1.2rem;
      opacity: 0.5;
      color: #B8946A;
    }

    @media (max-width: 550px) {
      .card {
        width: 92%;
        padding: 1.6rem 1.2rem;
      }
      h1 {
        font-size: 2.3rem;
      }
      .her-name {
        font-size: 1.6rem;
      }
      .btn {
        font-size: 1.1rem;
        padding: 0.6rem 1.3rem;
        min-width: 115px;
      }
      .date-time {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

<canvas id="canvas-3d"></canvas>

<div class="card">
  <h1>☕ coffee?</h1>
  <div class="her-name">radnyee</div>
  <div class="date-time">✨ 1 may · 5pm ✨</div>
  <div class="ask">coffee together? location — anywhere you’d love.</div>

  <div class="buttons">
    <button class="btn btn-yes" id="yesBtn">yes ✨</button>
    <button class="btn btn-no" id="noBtn">no</button>
  </div>

  <div id="responseMessage" class="response-area">
    <span>just say yes → coffee & a beautiful evening.</span>
  </div>
  <div class="tiny-footer">for radnyee · 1 may</div>
</div>

<!-- Three.js library -->
<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';

  // --- setup 3D Romantic Scene ---
  const canvasEl = document.getElementById('canvas-3d');
  const scene = new THREE.Scene();
  scene.background = null; // transparent blend with body gradient
  scene.fog = new THREE.FogExp2(0x020100, 0.012);
  
  const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 1.5, 18);
  camera.lookAt(0, 0, 0);
  
  const renderer = new THREE.WebGLRenderer({ canvas: canvasEl, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  
  // --- Lights for depth and romance ---
  const ambient = new THREE.AmbientLight(0x2c1e12);
  scene.add(ambient);
  const mainLight = new THREE.DirectionalLight(0xffc896, 1.2);
  mainLight.position.set(5, 8, 5);
  scene.add(mainLight);
  const backLight = new THREE.PointLight(0xc97e45, 0.7);
  backLight.position.set(-3, 2, -6);
  scene.add(backLight);
  const fillLight = new THREE.PointLight(0xd89254, 0.5);
  fillLight.position.set(4, 3, 4);
  scene.add(fillLight);
  
  // --- Floating Heart Particles (advanced, romantic, millions of tiny specks) ---
  const heartParticleCount = 1800;
  const heartGeometry = new THREE.BufferGeometry();
  const heartPositions = new Float32Array(heartParticleCount * 3);
  for (let i = 0; i < heartParticleCount; i++) {
    // scattered in a cylinder shape
    heartPositions[i*3] = (Math.random() - 0.5) * 38;
    heartPositions[i*3+1] = (Math.random() - 0.5) * 24;
    heartPositions[i*3+2] = (Math.random() - 0.5) * 32 - 12;
  }
  heartGeometry.setAttribute('position', new THREE.BufferAttribute(heartPositions, 3));
  const particleMaterial = new THREE.PointsMaterial({
    color: 0xffaa77,
    size: 0.09,
    transparent: true,
    opacity: 0.55,
    blending: THREE.AdditiveBlending
  });
  const particleSystem = new THREE.Points(heartGeometry, particleMaterial);
  scene.add(particleSystem);
  
  // --- Soft glowing orbs floating (rose gold and cream) ---
  const orbCount = 220;
  const orbGeom = new THREE.SphereGeometry(0.11, 12, 12);
  const orbList = [];
  for (let i = 0; i < orbCount; i++) {
    const colorChoice = Math.random() > 0.6 ? 0xffaa77 : 0xffbb99;
    const material = new THREE.MeshStandardMaterial({ color: colorChoice, emissive: 0x552200, emissiveIntensity: 0.35 });
    const orb = new THREE.Mesh(orbGeom, material);
    orb.userData = {
      vx: (Math.random() - 0.5) * 0.008,
      vy: (Math.random() - 0.5) * 0.006 + 0.004,
      vz: (Math.random() - 0.5) * 0.007,
      posX: (Math.random() - 0.5) * 32,
      posY: (Math.random() - 0.5) * 20,
      posZ: (Math.random() - 0.5) * 28 - 10,
    };
    orb.position.set(orb.userData.posX, orb.userData.posY, orb.userData.posZ);
    scene.add(orb);
    orbList.push(orb);
  }
  
  // --- Romantic rotating heart ring (3D ring of tiny hearts sprite) ---
  // create custom heart texture via canvas
  function createHeartTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 32;
    canvas.height = 32;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, 32, 32);
    ctx.font = "26px 'Segoe UI', 'Arial'";
    ctx.fillStyle = '#ff99aa';
    ctx.fillText("❤️", 3, 25);
    return new THREE.CanvasTexture(canvas);
  }
  const heartTexture = createHeartTexture();
  const heartRingGroup = [];
  const ringCount = 45;
  for (let i = 0; i < ringCount; i++) {
    const spriteMat = new THREE.SpriteMaterial({ map: heartTexture, transparent: true, opacity: 0.75, blending: THREE.AdditiveBlending });
    const sprite = new THREE.Sprite(spriteMat);
    const angle = (i / ringCount) * Math.PI * 2;
    const radius = 4.2;
    const x = Math.cos(angle) * radius;
    const z = Math.sin(angle) * radius;
    sprite.position.set(x, Math.sin(angle * 2) * 0.8, z);
    sprite.scale.set(0.55, 0.55, 1);
    scene.add(sprite);
    heartRingGroup.push(sprite);
  }
  
  // Floating ribbons effect (small rotating stars)
  const starCount = 500;
  const starGeom = new THREE.BufferGeometry();
  const starPositions = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    starPositions[i*3] = (Math.random() - 0.5) * 55;
    starPositions[i*3+1] = (Math.random() - 0.5) * 30;
    starPositions[i*3+2] = (Math.random() - 0.5) * 40 - 20;
  }
  starGeom.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
  const starMaterial = new THREE.PointsMaterial({ color: 0xffcf99, size: 0.07, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
  const starsField = new THREE.Points(starGeom, starMaterial);
  scene.add(starsField);
  
  // time for animations
  let time = 0;
  
  function animate3D() {
    requestAnimationFrame(animate3D);
    time += 0.012;
    
    // rotate particle field gently
    particleSystem.rotation.y = time * 0.08;
    particleSystem.rotation.x = Math.sin(time * 0.2) * 0.1;
    starsField.rotation.y = time * 0.03;
    starsField.rotation.x = time * 0.02;
    
    // animate orbs floating
    orbList.forEach(orb => {
      orb.userData.posX += orb.userData.vx;
      orb.userData.posY += orb.userData.vy;
      orb.userData.posZ += orb.userData.vz;
      if (Math.abs(orb.userData.posX) > 28) orb.userData.vx *= -0.98;
      if (Math.abs(orb.userData.posY) > 18) orb.userData.vy *= -0.98;
      if (Math.abs(orb.userData.posZ) > 22) orb.userData.vz *= -0.98;
      orb.position.x = orb.userData.posX;
      orb.position.y = orb.userData.posY;
      orb.position.z = orb.userData.posZ;
      const pulse = 0.4 + Math.sin(time * 3 + orb.userData.posX) * 0.2;
      orb.material.emissiveIntensity = pulse;
    });
    
    // animate heart ring: rotate around Y axis
    heartRingGroup.forEach((heart, idx) => {
      const angle = (idx / ringCount) * Math.PI * 2 + time * 0.8;
      const radius = 4.5;
      heart.position.x = Math.cos(angle) * radius;
      heart.position.z = Math.sin(angle) * radius;
      heart.position.y = Math.sin(angle * 2 + time) * 0.9;
      heart.material.opacity = 0.7 + Math.sin(time * 3 + idx) * 0.25;
    });
    
    // slight camera motion
    camera.position.x += (Math.sin(time * 0.2) * 0.12 - camera.position.x) * 0.03;
    camera.position.y += (Math.sin(time * 0.35) * 0.1 - camera.position.y) * 0.03;
    camera.lookAt(0, 0.5, 0);
    
    renderer.render(scene, camera);
  }
  
  animate3D();
  
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
  
  // ---------- Interactive logic: YES / NO (Desktop: no button runs away, Mobile: No button disabled) ----------
  const yesButton = document.getElementById('yesBtn');
  const noButton = document.getElementById('noBtn');
  const responseDiv = document.getElementById('responseMessage');
  
  // detect mobile (touch or small screen)
  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || ('ontouchstart' in window) || (window.innerWidth <= 768);
  
  let isConfirmed = false;
  
  // Disable no button completely on mobile (cannot be clicked at all)
  if (isMobile) {
    noButton.disabled = true;
    noButton.style.pointerEvents = 'none';
    noButton.classList.add('no-disabled-mobile');
    noButton.style.cursor = 'not-allowed';
    noButton.style.opacity = '0.5';
  } else {
    // DESKTOP: Make no button RUN AWAY from cursor, never reachable
    noButton.disabled = false;
    noButton.style.pointerEvents = 'auto';
    let runawayActive = true;
    const container = noButton.parentElement;
    
    function getRandomSafePosition(btn) {
      const parentRect = container.getBoundingClientRect();
      const btnRect = btn.getBoundingClientRect();
      const btnWidth = btnRect.width;
      const btnHeight = btnRect.height;
      const padding = 15;
      let maxX = parentRect.width - btnWidth - padding;
      let maxY = parentRect.height - btnHeight - padding;
      let minX = padding;
      let minY = padding;
      if (maxX < minX) maxX = minX + 5;
      if (maxY < minY) maxY = minY + 5;
      const randX = Math.floor(Math.random() * (maxX - minX + 1) + minX);
      const randY = Math.floor(Math.random() * (maxY - minY + 1) + minY);
      return { x: randX, y: randY };
    }
    
    function moveNoButton() {
      if (!runawayActive || isConfirmed) return;
      const parentRect = container.getBoundingClientRect();
      const btnRect = noButton.getBoundingClientRect();
      const currentLeft = btnRect.left - parentRect.left;
      const currentTop = btnRect.top - parentRect.top;
      const { x, y } = getRandomSafePosition(noButton);
      const deltaX = x - currentLeft;
      const deltaY = y - currentTop;
      noButton.style.transition = 'transform 0.2s cubic-bezier(0.2, 1.1, 0.4, 1.2)';
      noButton.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
      // tiny playful heart feedback
      const heartSpan = document.querySelector('.tiny-footer');
      if (heartSpan) heartSpan.style.opacity = '1';
    }
    
    function onMouseMoveNear(e) {
      if (!runawayActive || isConfirmed) return;
      const rect = noButton.getBoundingClientRect();
      const mouseX = e.clientX;
      const mouseY = e.clientY;
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const distance = Math.hypot(mouseX - centerX, mouseY - centerY);
      if (distance < 90) {
        moveNoButton();
      }
    }
    
    document.addEventListener('mousemove', onMouseMoveNear);
    
    // also on window resize, reposition no button inside boundaries
    window.addEventListener('resize', () => {
      if (!runawayActive || isConfirmed) return;
      noButton.style.transform = 'none';
      setTimeout(() => {
        const parentRect = container.getBoundingClientRect();
        const btnRect = noButton.getBoundingClientRect();
        if (btnRect.left < parentRect.left + 5 || btnRect.right > parentRect.right - 5 || btnRect.top < parentRect.top + 5) {
          moveNoButton();
        }
      }, 30);
    });
    
    window.cleanupRunaway = () => {
      runawayActive = false;
      document.removeEventListener('mousemove', onMouseMoveNear);
    };
  }
  
  // YES BUTTON LOGIC: simple reply + celebration and disable all
  function onYesClick() {
    if (isConfirmed) return;
    isConfirmed = true;
    
    // disable no button completely (for both mobile & desktop)
    noButton.disabled = true;
    noButton.style.pointerEvents = 'none';
    noButton.style.opacity = '0.4';
    noButton.style.cursor = 'default';
    if (!isMobile) {
      if (window.cleanupRunaway) window.cleanupRunaway();
      noButton.style.transform = 'none';
    }
    
    // update response with date: 1 may 5pm (already shown) & coffee
    responseDiv.innerHTML = `✨ can't wait, radnyee! ✨<br> ☕ 1 may · 5pm — just coffee & you. we'll find the perfect spot. 💛`;
    // add confetti effect (romantic)
    createRomanticConfetti();
    // subtle 3D pulse effect on card
    const cardDiv = document.querySelector('.card');
    cardDiv.style.transform = 'scale(1.01)';
    setTimeout(() => { if(cardDiv) cardDiv.style.transform = ''; }, 300);
  }
  
  function createRomanticConfetti() {
    const colors = ['#FFDDB7', '#F7BD7A', '#FFB347', '#FF9F6E', '#E6A878'];
    for (let i = 0; i < 120; i++) {
      const conf = document.createElement('div');
      const icons = ['❤️', '✨', '☕', '💛', '🌸', '⭐'];
      conf.innerHTML = icons[Math.floor(Math.random() * icons.length)];
      conf.style.position = 'fixed';
      conf.style.left = Math.random() * window.innerWidth + 'px';
      conf.style.top = '-40px';
      conf.style.fontSize = (18 + Math.random() * 28) + 'px';
      conf.style.pointerEvents = 'none';
      conf.style.zIndex = '9999';
      conf.style.opacity = '0.9';
      conf.style.transition = 'transform 1.2s ease-out, opacity 1.2s';
      document.body.appendChild(conf);
      const fall = () => {
        conf.style.transform = `translateY(${window.innerHeight + 100}px) rotate(${Math.random() * 400}deg)`;
        conf.style.opacity = '0';
        setTimeout(() => conf.remove(), 1300);
      };
      setTimeout(fall, i * 20);
    }
    // plus heart burst
    for (let i=0;i<40;i++) {
      const heartBurst = document.createElement('div');
      heartBurst.innerHTML = '💖';
      heartBurst.style.position = 'fixed';
      heartBurst.style.left = Math.random() * window.innerWidth + 'px';
      heartBurst.style.bottom = '-20px';
      heartBurst.style.fontSize = (14 + Math.random() * 24) + 'px';
      heartBurst.style.pointerEvents = 'none';
      heartBurst.style.zIndex = '9998';
      heartBurst.style.transition = 'all 1s linear';
      heartBurst.style.opacity = '0.8';
      document.body.appendChild(heartBurst);
      setTimeout(() => {
        heartBurst.style.transform = `translateY(-${window.innerHeight + 80}px) rotate(${Math.random() * 360}deg)`;
        heartBurst.style.opacity = '0';
        setTimeout(() => heartBurst.remove(), 1100);
      }, i * 25);
    }
  }
  
  yesButton.addEventListener('click', onYesClick);
  
  // For desktop: If somebody miraculously clicks the "No" button via tab or something, convert to yes.
  noButton.addEventListener('click', (e) => {
    if (isConfirmed) return;
    e.preventDefault();
    // Any click on no (desktop runaway, but if somehow triggered) we turn into yes
    if (!isConfirmed) {
      onYesClick();
      responseDiv.innerHTML = `💛 even your 'no' turned into a 'yes' — 1 may, 5pm, coffee. 💛`;
    }
  });
  
  // Option: For desktop, make sure the no button is never reachable; just for sanity, if confirm happens it's fine.
  // For mobile, no button is disabled and unclickable. Perfect.
</script>
</body>
</html>
